name: CI/CD Amazona

on:
  push:
    branches:
      - main

jobs:

  backend-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4


    - name: Backend install
      run: |
        cd backend
        npm install --legacy-peer-deps


    - name: Backend test
      run: |
        cd backend
        npm test || echo "no tests"


  frontend-build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Frontend install
      run: |
        cd frontend
        npm install --legacy-peer-deps


    - name: Frontend build
      run: |
        cd frontend
        CI=false npm run build


  docker-build-push:

    needs:
      - backend-test
      - frontend-build


    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Login Docker Hub

      uses: docker/login-action@v3

      with:

        username: ${{ secrets.DOCKER_USERNAME }}

        password: ${{ secrets.DOCKER_PASSWORD }}



    - name: Build Backend

      run: |

        docker build -t yousefabozahra/amazona-backend ./backend


    - name: Push Backend

      run: |

        docker push yousefabozahra/amazona-backend



    - name: Build Frontend

      run: |

        docker build -t yousefabozahra/amazona-frontend ./frontend



    - name: Push Frontend

      run: |

        docker push yousefabozahra/amazona-frontend