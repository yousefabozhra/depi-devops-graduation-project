name: CI/CD Pipeline

on:
  push:
    branches:
      - main


jobs:

  build-and-push:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1



      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2



      - name: Build backend image
        run: |
          docker build \
          -t 781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-backend:latest \
          ./backend



      - name: Push backend image
        run: |
          docker push \
          781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-backend:latest



      - name: Build frontend image
        run: |
          docker build \
          -t 781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-frontend:latest \
          ./frontend



      - name: Push frontend image
        run: |
          docker push \
          781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-frontend:latest