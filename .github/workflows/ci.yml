name: CI/CD Pipeline


on:

  push:

    branches:

      - main



jobs:


  build-and-deploy:


    runs-on: ubuntu-latest



    steps:



    - name: Checkout

      uses: actions/checkout@v4





    - name: Configure AWS credentials

      uses: aws-actions/configure-aws-credentials@v4

      with:

        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

        aws-region: us-east-1





    - name: Login to Amazon ECR

      uses: aws-actions/amazon-ecr-login@v2





    - name: Build Backend Image

      run: |

        docker build \
        -t 781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-backend:${{ github.sha }} \
        ./backend





    - name: Push Backend Image

      run: |

        docker push 781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-backend:${{ github.sha }}






    - name: Build Frontend Image

      run: |

        docker build \
        -t 781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-frontend:${{ github.sha }} \
        ./frontend





    - name: Push Frontend Image

      run: |

        docker push 781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-frontend:${{ github.sha }}






    - name: Configure kubectl

      run: |

        aws eks update-kubeconfig \
        --name amazona-cluster \
        --region us-east-1





    - name: Deploy Kubernetes Files

      run: |

        kubectl apply -f k8s/






    - name: Update Backend Deployment Image

      run: |

        kubectl set image deployment/amazona-backend \
        backend=781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-backend:${{ github.sha }}






    - name: Update Frontend Deployment Image

      run: |

        kubectl set image deployment/amazona-frontend \
        frontend=781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-frontend:${{ github.sha }}






    - name: Restart Deployments

      run: |

        kubectl rollout restart deployment amazona-backend

        kubectl rollout restart deployment amazona-frontend






    - name: Check Backend Rollout

      run: |

        kubectl rollout status deployment amazona-backend





    - name: Check Frontend Rollout

      run: |

        kubectl rollout status deployment amazona-frontend