apiVersion: apps/v1
kind: Deployment

metadata:
  name: amazona-backend

spec:
  replicas: 2

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: amazona-backend

  template:
    metadata:
      labels:
        app: amazona-backend

    spec:

      containers:

      - name: backend

        image: 781195019583.dkr.ecr.us-east-1.amazonaws.com/amazona-backend:latest

        ports:
        - containerPort: 5000


        env:
        - name: MONGODB_URL
          valueFrom:
            secretKeyRef:
              name: amazona-backend-secret
              key: MONGODB_URL

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: amazona-backend-secret
              key: JWT_SECRET